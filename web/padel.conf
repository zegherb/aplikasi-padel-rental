<VirtualHost *:80>
    ServerName localhost

    WSGIDaemonProcess padelapp user=www-data group=www-data threads=5
    WSGIScriptAlias / /var/www/padel/wsgi.py

    <Directory /var/www/padel>
        WSGIProcessGroup padelapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
</VirtualHost>